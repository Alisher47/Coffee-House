<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee House - Login</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="container">

        <div class="left-section">
            <div class="content">
                <h1>Welcome Back ☕</h1>
                <p>
                    Log in to continue exploring our delicious coffee menu,
                    special offers, and favorite drinks.
                </p>
            </div>
        </div>

        <div class="right-section">

            <div class="login-card">

                <h2>Login</h2>
                <p class="subtitle">Access your coffee account</p>

                <form>

                    <div class="input-box">
                        <input type="email" placeholder="Email Address">
                    </div>

                    <div class="input-box">
                        <input type="password" placeholder="Password">
                    </div>

                    <div class="options">
                        <label>
                            <input type="checkbox">
                            Remember Me
                        </label>

                        <a href="#">Forgot Password?</a>
                    </div>

                    <button type="submit">
                        Login
                    </button>

                    <p class="signup-link">
                        Don't have an account?
                        <a href="/signup/index.html">Create Account</a>
                    </p>

                </form>

            </div>

        </div>

    </div>

</body>
<script src="index.js"></script>
</html>
